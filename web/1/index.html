
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>隐身文本加密器</title>
   <style>
        :root { --accent: #8b5cf6; --bg: #000000; --panel: #111111; --border: #2dd4bf; --text: #e2e8f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; opacity: 0.5; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", monospace; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            overflow-y: scroll; 
        }
        .card { background: var(--panel); width: 100%; max-width: 450px; border: 1px solid #333; padding: 24px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-top: 5vh; }
        .card::before { content: ""; position: absolute; top: -1px; left: -1px; width: 20px; height: 20px; border-top: 2px solid var(--border); border-left: 2px solid var(--border); }
        h2 { margin: 0 0 20px 0; font-size: 1.2rem; letter-spacing: 4px; color: var(--border); text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 8px; font-size: 0.7rem; color: #666; letter-spacing: 1px; }
        
        textarea, input { width: 100%; background: #050505; border: 1px solid #222; border-radius: 0; padding: 12px; color: #fff; font-size: 1rem; outline: none; transition: all 0.3s; }
        textarea:focus, input:focus { border-color: var(--border); background: #0a0a0a; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        @media (max-width: 400px) {
            .btn-group { grid-template-columns: 1fr; }
            .btn-clear { grid-column: span 1 !important; }
        }

        button { padding: 14px; border: 1px solid var(--border); border-radius: 0; cursor: pointer; font-weight: bold; transition: 0.2s; background: transparent; color: var(--border); font-size: 0.85rem; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .btn-enc { background: var(--border); color: #000; }
        .btn-clear { grid-column: span 2; border-color: #444; color: #888; margin-top: 5px; padding: 8px; font-size: 0.75rem; }
        
        .result-box { margin-top: 20px; background: #080808; border: 1px dashed #333; padding: 15px; position: relative; display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #outputText { word-break: break-all; font-size: 0.9rem; color: #4ade80; line-height: 1.5; margin-bottom: 30px; max-height: 200px; overflow-y: auto; }
        
        .copy-btn { position: absolute; bottom: 10px; right: 10px; background: #222; color: #ccc; font-size: 0.7rem; padding: 5px 12px; border: 1px solid #444; cursor: pointer; }
        .status { font-size: 0.7rem; color: var(--border); margin-top: 12px; text-align: center; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <h2>TEXT. 加密</h2>
    
    <label>输入数据 / 密文</label>
    <textarea id="inputText" rows="5" placeholder="在此输入文字..."></textarea>
    
    <label>密钥 (KEY)</label>
    <input type="password" id="password" placeholder="请输入访问密钥">
    
    <div class="btn-group">
        <button class="btn-enc" onclick="run(true)">加密</button>
        <button class="btn-dec" onclick="run(false)">解密</button>
        <button class="btn-clear" onclick="clearAll()">清除所有输入</button>
    </div>

    <div id="resWrap" class="result-box">
        <div id="outputText"></div>
        <button class="copy-btn" onclick="copyRes()">复制结果</button>
    </div>
    <div id="status" class="status"></div>
</div>

<script>
    const ZW = ['\u200c', '\u2060'];

    async function run(isEnc) {
        const txt = document.getElementById('inputText').value;
        const pw = document.getElementById('password').value;
        const out = document.getElementById('outputText');
        const wrap = document.getElementById('resWrap');
        const stat = document.getElementById('status');

        if (!txt) {
            alert("请输入需要处理的内容");
            return;
        }
        if (!pw) {
            alert("请输入密钥以保证安全");
            return;
        }

        try {
            const enc = new TextEncoder();
            const pwH = await crypto.subtle.digest('SHA-256', enc.encode(pw));
            const key = await crypto.subtle.importKey('raw', pwH, 'AES-GCM', false, ['encrypt', 'decrypt']);

            if (isEnc) {
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const eb = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(txt));
                const comb = new Uint8Array(iv.length + eb.byteLength);
                comb.set(iv); comb.set(new Uint8Array(eb), iv.length);
                const b64 = btoa(String.fromCharCode(...comb));
                const zw = b64.split('').map(c => 
                    c.charCodeAt(0).toString(2).padStart(8, '0').split('').map(b => ZW[b]).join('')
                ).join('');
                out.innerText = `:${zw})`;
                stat.innerText = "> 加密成功 - 密文已隐藏于笑脸";
            } else {
                const match = txt.match(/[:\uff1a]([\u200c\u2060]+)[)\uff09]/);
                if (!match) {
                    alert("未检测到有效的笑脸密文格式");
                    return;
                }
                const b64 = (match[1].match(/.{8}/g) || []).map(b => 
                    String.fromCharCode(parseInt(b.split('').map(c => c === ZW[0] ? '0' : '1').join(''), 2))
                ).join('');
                const comb = new Uint8Array(atob(b64).split('').map(c => c.charCodeAt(0)));
                const db = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: comb.slice(0, 12) }, key, comb.slice(12));
                out.innerText = new TextDecoder().decode(db);
                stat.innerText = "> 解密成功 - 数据已提取";
            }
            wrap.style.display = 'block';
        } catch (e) {
            alert("解密失败：密钥错误或数据被破坏");
        }
    }

    function clearAll() {
        document.getElementById('inputText').value = "";
        document.getElementById('password').value = "";
        document.getElementById('resWrap').style.display = "none";
        document.getElementById('status').innerText = "> 就绪";
    }

    function copyRes() {
        const text = document.getElementById('outputText').innerText;
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        const btn = document.querySelector('.copy-btn');
        btn.innerText = "已复制";
        setTimeout(() => btn.innerText = "复制结果", 2000);
    }
</script>

</body>
</html>
